
<app-header></app-header>


<main>
    <ul>
        @for (user of users; track user.id) {
            <li>
                <app-user [avatar]="user.avatar" [name]="user.name" [id]="user.id" (userSelected)="onUserSelected($event)"></app-user>
            </li>
        }   
    </ul>

    @if (selectedUser()) {
        <app-tasks [user]="selectedUser()!"></app-tasks>
    }
</main>
