<section>
  <header>
    <h2>{{ user().name }}'s Tasks</h2>
    <button class="add-btn" (click)="onAddTask()">+ Add Task</button>
  </header>

  <ul>
    @for (task of tasks(); track task.id) {
    <li>
        <app-task [task]="task" (taskCompleted)="onTaskCompleted($event)"></app-task>
    </li>
    }
  </ul>
</section>

@if (isAddingTask()) {
  <app-new-task (cancel)="onCancelAddTask()" (save)="onSaveTask($event)" />
}
